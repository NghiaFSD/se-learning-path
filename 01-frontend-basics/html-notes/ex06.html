<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>HTML FROM</h1>
    <form action="https://api-gateway.f8.edu.vn/action_page.php" method="post">
      <div>
        <label for="fullname">Fullname</label>
        <input
          type="text"
          name="fullname"
          placeholder="vui lòng nhập họ và tên"
          id="fullname"
          value=""
          required
          maxlength="10"
        />
      </div>

      <div>
        <label for="email">Email</label>
        <input
          type="email"
          name="email"
          placeholder="vui lòng nhập email"
          id="email"
          value=""
          required
        />
      </div>

      <div>
        <label for="password">Password</label>
        <input
          type="password"
          name="password"
          placeholder="vui lòng nhập password"
          id="password"
          value=""
          required
        />
      </div>

      <div>
        <label for="age">Age</label>
        <input
          type="number"
          name="age"
          placeholder="vui lòng nhập tuổi"
          id="age"
          value=""
          required
          min="10"
          max="50"
          step="0.1"
        />
      </div>

      <div>
        <label for="avatar">Avatar</label>
        <input type="file" name="avatar" id="avatar" multiple />
      </div>

      <div>
        <label>Giới tính</label>
        <label>
          <input type="radio" name="gender" value="male" checked />Nam
        </label>
        <label> <input type="radio" name="gender" value="female" />Nữ </label>
      </div>

      <div>
        <label>Nguồn</label>
        <label>
          <input
            type="checkbox"
            name="source"
            value="facebook"
            checked
          />Facebook
        </label>
        <label>
          <input type="checkbox" name="source" value="google" />Google
        </label>
        <label>
          <input type="checkbox" name="source" value="youtube" />Youtube
        </label>
      </div>

      <div>
        <label for="province">Tỉnh/Thành phố</label>
        <select name="province" id="province">
          <option value="0">Chọn Tỉnh/Thành phố</option>
          <option value="1" selected>Hà Nội</option>
          <option value="2">Đà Nẵng</option>
          <option value="3">Hồ Chí Minh</option>
        </select>
      </div>

      <div>
        <label for="message">Tin nhắn</label>
        <textarea
          name="message"
          id="message"
          placeholder="Message..."
          cols="30"
          rows="5"
        >
        </textarea>
      </div>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
